version: "3"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lotto
      POSTGRES_USER: lotto_user
      POSTGRES_PASSWORD: "1234"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - lotto-net

  web:
    build: ./django
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      USE_POSTGRES: "1"
      POSTGRES_DB: lotto
      POSTGRES_USER: lotto_user
      POSTGRES_PASSWORD: "1234"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      - db
    networks:
      - lotto-net

networks:
  lotto-net:
    driver: bridge

volumes:
  db_data: