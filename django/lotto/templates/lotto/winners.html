{% extends 'lotto/base.html' %}
{% block content %}
<h1>당첨 내역</h1>
<table border="1">
<tr><th>회차</th><th>사용자</th><th>등수</th><th>당첨금</th><th>번호</th></tr>
{% for t in winners %}
<tr>
  <td>{{ t.draw_round.round_no }}</td>
  <td>{{ t.user.username }}</td>
  <td>{{ t.rank }}등</td>
  <td>{{ t.prize }}원</td>
  <td>{% for n in t.numbers %}{{ n }} {% endfor %}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
