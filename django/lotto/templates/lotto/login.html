{% extends 'lotto/base.html' %}
{% block content %}
<div class="card" style="max-width:500px; margin:0 auto;">
  <h1><span class="emoji">🔑</span> 로그인</h1>

  {% if form.errors %}
    <div class="alert alert-error">
      ⚠ 아이디 또는 비밀번호가 올바르지 않습니다.
    </div>
  {% endif %}

  <form method="post">{% csrf_token %}
    <label>아이디</label>
    <input type="text" name="username" required>

    <label>비밀번호</label>
    <input type="password" name="password" required>

    <button type="submit">일반 사용자 로그인</button>
    <a href="{% url 'lotto:signup' %}" style="margin-left:12px; color:#ffd700;">회원가입</a>
  </form>

  <hr style="margin:30px 0; border-color:rgba(255,255,255,0.1);">

  <h2 style="font-size:16px;">관리자이신가요?</h2>
  <p style="color:#aaa; font-size:14px; margin-bottom:12px;">
    관리자 계정으로 위 폼에 로그인하시면 자동으로 관리자 메뉴가 표시됩니다.
  </p>
  <a href="/admin/" class="btn btn-danger">⚙ Django Admin 페이지로</a>
</div>
{% endblock %}
